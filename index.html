<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>工作待办追踪系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:24px 20px}

/* ===== 头部 ===== */
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.header h1{font-size:22px;font-weight:700;color:#1d1d1f;letter-spacing:-.3px}
.header .sub{font-size:13px;color:#86868b;margin-top:2px}
.header .user-area{text-align:right;white-space:nowrap;flex-shrink:0;font-size:13px}
.header .user-area .name{font-weight:500}
.header .user-area .logout-btn{font-size:12px;color:#86868b;cursor:pointer;padding:3px 10px;border-radius:6px;background:#f0f0f0;border:none;margin-top:3px}
.header .user-area .logout-btn:hover{background:#e0e0e0}

/* ===== 日期栏 + 云状态 ===== */
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.top-bar .date-group{display:flex;align-items:center;gap:6px;background:white;border-radius:10px;padding:8px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.top-bar .date-group label{font-size:13px;font-weight:600}
.top-bar .date-group input[type=date]{border:none;font-size:13px;outline:none;color:#1d1d1f}
.top-bar .weekday{font-size:12px;color:#86868b}
.top-bar .cloud-status{font-size:12px;color:#86868b;margin-left:auto;display:flex;align-items:center;gap:4px}
.top-bar .cloud-status .dot{width:5px;height:5px;border-radius:50%;background:#86868b}
.top-bar .cloud-status.synced .dot{background:#34c759}
.top-bar .refresh-btn{background:white;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center}

/* ===== 主网格 ===== */
.main-grid{display:grid;grid-template-columns:1fr 340px;gap:16px}
@media(max-width:860px){.main-grid{grid-template-columns:1fr}}

/* ===== 卡片 ===== */
.card{background:white;border-radius:14px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.card-header .title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-header .badge{background:#f0f0f0;border-radius:20px;padding:0 10px;font-size:11px;line-height:20px;white-space:nowrap;color:#666;font-weight:500}
.card-header .badge.red{color:#ef4444;background:#fef2f2}
.card-header .badge.green{color:#34c759;background:#e8f8ed}
.card-section{margin-bottom:16px}
.card-section:last-child{margin-bottom:0}

/* ===== 筛选药丸 ===== */
.filter-pills{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;flex-wrap:wrap}
.filter-pills .pill{flex-shrink:0;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;background:#f5f5f7;color:#666;border:1px solid transparent;transition:all .15s}
.filter-pills .pill:hover{background:#e8e8ed}
.filter-pills .pill.active{background:#1d1d1f;color:white;border-color:#1d1d1f}
.filter-pills .pill.tag-active{background:#f0f0f0;color:#1d1d1f}
.filter-pills .sort-select{flex-shrink:0;padding:5px 10px;border:1px solid #e8e8e8;border-radius:100px;font-size:12px;outline:none;background:#f5f5f7;color:#666;margin-left:auto}

/* ===== 添加待办区域 ===== */
.add-section{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end}
.add-section .field{display:flex;flex-direction:column;gap:3px}
.add-section .field label{font-size:11px;font-weight:600;color:#86868b}
.add-section .field input,.add-section .field select{padding:7px 10px;border:1px solid #e8e8e8;border-radius:8px;font-size:13px;outline:none;background:#fafafa;min-width:0}
.add-section .field input:focus,.add-section .field select:focus{border-color:#1d1d1f;background:white}
.add-section .field select{min-width:90px}
.add-section .field input[type=datetime-local]{min-width:165px}
.add-section .field input[type=text]{min-width:200px}
.add-btns{display:flex;gap:6px;align-items:flex-end}
.add-btns .btn-main{background:#1d1d1f;color:white;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.add-btns .btn-main:hover{background:#333}
.add-btns .btn-main:active{transform:scale(.97)}
.add-btns .btn-second{background:transparent;border:1px solid #e0e0e0;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:#666}
.add-btns .btn-second:hover{background:#f5f5f5}

/* ===== 标签选择器 ===== */
.tag-select-wrap{position:relative;min-width:160px}
.tag-select-trigger{display:flex;flex-wrap:wrap;gap:3px;padding:6px 10px;border:1px solid #e8e8e8;border-radius:8px;font-size:13px;cursor:pointer;background:#fafafa;min-height:33px;align-items:center}
.tag-select-trigger:focus,.tag-select-trigger.open{border-color:#1d1d1f;background:white}
.tag-select-trigger .placeholder{color:#bbb;font-size:13px}
.tag-chip{display:inline-flex;align-items:center;gap:3px;background:#f0f0f0;color:#555;border-radius:4px;padding:1px 7px;font-size:11px;line-height:20px}
.tag-chip .remove{cursor:pointer;font-weight:700;font-size:13px;line-height:1;margin-left:2px;color:#999}
.tag-chip .remove:hover{color:#ef4444}
.tag-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1px solid #e0e0e0;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:100;max-height:200px;overflow-y:auto;padding:6px 0}
.tag-dropdown.show{display:block}
.tag-dropdown .opt{padding:7px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px}
.tag-dropdown .opt:hover{background:#f5f5f5}
.tag-dropdown .opt input[type=checkbox]{accent-color:#1d1d1f;width:15px;height:15px}
.tag-dropdown .opt .label{flex:1}
.tag-dropdown .custom-add{display:flex;padding:7px 14px;gap:6px;border-top:1px solid #eee}
.tag-dropdown .custom-add input{flex:1;border:1px solid #e0e0e0;border-radius:6px;padding:5px 8px;font-size:12px;outline:none;min-width:0}
.tag-dropdown .custom-add input:focus{border-color:#1d1d1f}
.tag-dropdown .custom-add button{background:#1d1d1f;color:white;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}

/* ===== 任务列表 ===== */
.task-list{list-style:none}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.task-item:last-child{border-bottom:none}
.task-item .prio-bar{width:3px;flex-shrink:0;border-radius:2px;height:38px;margin-top:2px}
.task-item .prio-bar.p1{background:#ef4444}
.task-item .prio-bar.p2{background:#f59e0b}
.task-item .prio-bar.p3{background:#d0d5dd}
.task-item .check-col{flex-shrink:0;padding-top:3px}
.task-item .check-col .cb{width:18px;height:18px;border-radius:50%;border:2px solid #d0d5dd;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:white}
.task-item .check-col .cb.done{border-color:#34c759;background:#34c759}
.task-item .body-col{flex:1;min-width:0}
.task-item .body-col .name{font-size:14px;font-weight:500;word-break:break-word}
.task-item .body-col .name.done{text-decoration:line-through;color:#aaa}
.task-item .body-col .meta{font-size:12px;color:#86868b;margin-top:3px;display:flex;flex-wrap:wrap;gap:4px 8px}
.task-item .body-col .meta .tag{background:#f0f0f0;border-radius:4px;padding:1px 7px;font-size:11px;display:inline-block}
.task-item .body-col .meta .overdue{color:#ef4444;font-weight:600}
.task-item .actions-col{flex-shrink:0;display:flex;gap:4px;align-items:center}
.task-item .actions-col .btn-icon{background:transparent;border:none;color:#999;cursor:pointer;padding:2px 4px;font-size:14px;border-radius:4px}
.task-item .actions-col .btn-icon:hover{color:#333;background:#f5f5f5}
.empty-tip{text-align:center;color:#aaa;padding:28px 0;font-size:14px}
.filtered-count{font-size:12px;color:#999;margin-left:auto}

/* ===== 统计条 ===== */
.stats{display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0;font-size:13px;color:#86868b;flex-wrap:wrap}
.stats span strong{color:#1d1d1f;font-weight:600}
.stats span .num.red{color:#ef4444}

/* ===== 完成明细（右侧栏） ===== */
.summary-list{list-style:none}
.summary-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;gap:6px}
.summary-item:last-child{border-bottom:none}
.summary-item .name{flex:1;display:flex;align-items:center;gap:4px;font-weight:500}
.summary-item .count{font-size:12px;color:#86868b}
.summary-item .count .done{color:#34c759;font-weight:600}
.summary-item .count .pending{color:#f59e0b;font-weight:600}
.summary-item .pct{font-size:11px;color:#999;min-width:30px;text-align:right}
.tag-dist{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag-dist .tag-chip{background:#f5f5f7;border-radius:6px;padding:2px 10px;font-size:12px;color:#666}
.tag-dist .tag-chip .num{color:#1d1d1f;font-weight:600}

/* ===== 导出区域 ===== */
.export-section{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.export-section .info{font-size:13px;color:#86868b}
.export-section .info strong{color:#1d1d1f}
.export-btns{display:flex;gap:8px;flex-wrap:wrap}
.export-btns .btn{background:#f5f5f7;border:1px solid #e0e0e0;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:#1d1d1f}
.export-btns .btn:hover{background:#e8e8ed}
.export-btns .btn:active{transform:scale(.97)}
.export-btns .btn.primary{background:#1d1d1f;color:white;border-color:#1d1d1f}
.export-btns .btn.primary:hover{background:#333}
.export-btns .btn.danger{color:#ef4444}

/* ===== Toast ===== */
.toast{position:fixed;bottom:24px;right:24px;color:white;padding:12px 22px;border-radius:10px;font-size:14px;opacity:0;transform:translateY(16px);transition:all .3s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:999}
.toast.show{opacity:1;transform:translateY(0)}

/* ===== 弹窗 ===== */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;justify-content:center;align-items:center;padding:20px}
.modal-overlay#confirmModal{z-index:10000}
.modal-overlay#editModal{z-index:10001}
.modal-overlay.show{display:flex}
.modal-box{background:white;border-radius:16px;padding:24px;width:100%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.modal-box h3{font-size:17px;font-weight:600;margin-bottom:16px}
.modal-box .field{margin-bottom:14px}
.modal-box .field label{display:block;font-size:12px;font-weight:600;color:#86868b;margin-bottom:4px}
.modal-box .field input,.modal-box .field select{width:100%;padding:10px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;box-sizing:border-box}
.modal-box .field input:focus,.modal-box .field select:focus{border-color:#1d1d1f;box-shadow:0 0 0 3px rgba(0,0,0,.08)}
.modal-btns{display:flex;gap:10px;margin-top:4px;justify-content:flex-end}
.modal-btns .btn{background:#f5f5f7;border:1px solid #e0e0e0;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;color:#1d1d1f}
.modal-btns .btn:hover{background:#e8e8ed}
.modal-btns .btn.primary{background:#1d1d1f;color:white;border-color:#1d1d1f}
.modal-btns .btn.primary:hover{background:#333}
.modal-btns .btn.danger{color:#ef4444}

/* 编辑标签选择 */
.edit-tags-wrap{position:relative}
.edit-tags-trigger{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;cursor:pointer;background:#fafafa;min-height:38px;align-items:center}
.edit-tags-trigger:focus,.edit-tags-trigger.open{border-color:#1d1d1f;background:white}
.edit-tags-trigger .placeholder{color:#bbb}
.edit-tag-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1px solid #e0e0e0;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:101;max-height:200px;overflow-y:auto;padding:6px 0}
.edit-tag-dropdown.show{display:block}
.edit-tag-dropdown .opt{padding:7px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px}
.edit-tag-dropdown .opt:hover{background:#f5f5f5}
.edit-tag-dropdown .opt input[type=checkbox]{accent-color:#1d1d1f;width:15px;height:15px}
.edit-tag-dropdown .opt .label{flex:1}
.edit-tag-dropdown .custom-add{display:flex;padding:7px 14px;gap:6px;border-top:1px solid #eee}
.edit-tag-dropdown .custom-add input{flex:1;border:1px solid #e0e0e0;border-radius:6px;padding:5px 8px;font-size:12px;outline:none;min-width:0}
.edit-tag-dropdown .custom-add input:focus{border-color:#1d1d1f}
.edit-tag-dropdown .custom-add button{background:#1d1d1f;color:white;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}

/* ===== 选项库管理 ===== */
.lib-manager .tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #eee}
.lib-manager .tabs .tab{padding:8px 16px;cursor:pointer;font-size:14px;font-weight:600;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.lib-manager .tabs .tab.active{color:#1d1d1f;border-bottom-color:#1d1d1f}
.lib-manager .tab-panel{display:none}
.lib-manager .tab-panel.show{display:block}
.lib-manager .panel-header{display:flex;gap:8px;margin-bottom:12px}
.lib-manager .panel-header input{flex:1;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box}
.lib-manager .panel-header input:focus{border-color:#1d1d1f}
.lib-manager .panel-header button{background:#1d1d1f;color:white;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer}
.lib-manager .lib-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;gap:8px}
.lib-manager .lib-item:last-child{border-bottom:none}
.lib-manager .lib-item .name{flex:1;font-size:14px}
.lib-manager .lib-item .actns{display:flex;gap:4px}
.lib-manager .lib-item .actns button{background:transparent;border:1px solid #e0e0e0;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer}
.lib-manager .lib-item .actns button:hover{background:#f5f5f5}
.lib-manager .lib-list{max-height:300px;overflow-y:auto}

/* ===== Loading ===== */
.loading-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.7);z-index:999;justify-content:center;align-items:center}
.loading-overlay.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid #eee;border-top:3px solid #1d1d1f;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 锁屏弹窗 ===== */
.lock-box{text-align:center}
.lock-box .icon{font-size:40px;margin-bottom:8px}
.lock-box h3{margin:0;font-weight:600}
.lock-box .sub{font-size:13px;color:#86868b;margin-top:4px}
.lock-box .lock-error{color:#ef4444;font-size:13px;margin:-6px 0 10px;text-align:center;min-height:20px}
.lock-box .lock-btn{background:#1d1d1f;color:white;border:none;border-radius:8px;width:100%;font-size:15px;padding:10px;cursor:pointer}
.lock-box .lock-btn:hover{background:#333}
.lock-box .lock-btn:disabled{opacity:.6}
.lock-box .lock-switch{font-size:13px;color:#86868b;text-align:center;margin-top:12px}
</style>
<script src="/test2/lib/aipexbase.umd.min.js"></script>
</head>
<body>

<div class="app">

<!-- ===== 头部 ===== -->
<div class="header">
  <div>
    <h1>📋 待办</h1>
    <div class="sub">云端同步 · 手机电脑互通</div>
  </div>
  <div class="user-area">
    <div class="name" id="userNameDisplay"></div>
    <button class="logout-btn" id="logoutBtn" onclick="logout()" style="display:none">退出登录</button>
  </div>
</div>

<!-- ===== 日期栏 ===== -->
<div class="top-bar">
  <div class="date-group">
    <label>📅</label>
    <input type="date" id="curDate">
    <span class="weekday" id="weekdayLabel"></span>
  </div>
  <div id="cloudStatus" class="cloud-status"><span class="dot"></span> 已同步</div>
  <button class="refresh-btn" onclick="manualRefresh()">🔄</button>
</div>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<!-- ===== 主网格 ===== -->
<div class="main-grid">

<!-- ===== 左侧：待办列表 ===== -->
<div>
  <div class="card">
    <div class="card-header">
      <div class="title">📌 待办 <span class="badge" id="totalBadge">0 项</span></div>
    </div>

    <!-- 隐藏的筛选控件（JS 引用用） -->
    <select id="filterStatus" style="display:none"><option value="all">全部</option><option value="pending">待完成</option><option value="done">已完成</option></select>
    <select id="filterPriority" style="display:none"><option value="all">全部</option></select>
    <select id="filterTag" style="display:none"><option value="all">全部标签</option></select>
    <input type="date" id="filterDueFrom" style="display:none">
    <input type="date" id="filterDueTo" style="display:none">

    <!-- 筛选药丸 -->
    <div class="filter-pills">
      <span class="pill active" data-filter="all" onclick="setFilter('all',this)">全部</span>
      <span class="pill" data-filter="pending" onclick="setFilter('pending',this)">待完成</span>
      <span class="pill" data-filter="done" onclick="setFilter('done',this)">已完成</span>
      <span class="pill" data-filter="overdue" onclick="setFilter('overdue',this)" style="color:#ef4444">逾期</span>
      <select class="sort-select" id="sortBy" onchange="renderTasks()">
        <option value="prio">优先级 ↓</option>
        <option value="due">截止 ↑</option>
        <option value="added">添加顺序</option>
        <option value="alpha">名称</option>
      </select>
    </div>

    <!-- 添加待办 -->
    <div class="add-section">
      <div class="field" style="flex:1;min-width:180px">
        <label>待办名称</label>
        <div class="tag-select-wrap" id="taskNameWrap">
          <div class="tag-select-trigger" id="taskNameTrigger" tabindex="0" onclick="toggleTaskNameDropdown()">
            <span id="taskNameDisplay" style="color:#bbb;font-size:13px">点击选择或输入新名称</span>
          </div>
          <div class="tag-dropdown" id="taskNameDropdown">
            <div id="taskNameOptList"></div>
            <div class="custom-add">
              <input type="text" id="taskNameCustomInput" placeholder="输入新名称..." onkeydown="if(event.key==='Enter'){addCustomTaskName();event.preventDefault()}">
              <button onclick="addCustomTaskName()">+ 新建</button>
            </div>
          </div>
        </div>
      </div>
      <div class="field">
        <label>优先级</label>
        <select id="taskPrio"><option value="p2">🟡 中</option><option value="p1">🔴 高</option><option value="p3">⚪ 低</option></select>
      </div>
      <div class="field">
        <label>截止</label>
        <input type="datetime-local" id="taskDue">
      </div>
      <div class="field" style="min-width:150px">
        <label>标签</label>
        <div class="tag-select-wrap" id="tagSelectWrap">
          <div class="tag-select-trigger" id="tagTrigger" tabindex="0" onclick="toggleTagDropdown()">
            <span id="tagChipsContainer"></span>
            <span class="placeholder" id="tagPlaceholder">点击选择</span>
          </div>
          <div class="tag-dropdown" id="tagDropdown">
            <div id="tagOptList"></div>
            <div class="custom-add">
              <input type="text" id="tagCustomInput" placeholder="新建标签..." onkeydown="if(event.key==='Enter'){addCustomTag();event.preventDefault()}">
              <button onclick="addCustomTag()">+</button>
            </div>
          </div>
        </div>

async function cloudLoadLib(){
  try {
    const uid=getUserId();
    if(!uid) return null;
    const r=await client.db.from('tasks').list().eq('task_date','__lib__').eq('name','task_names'+uid);
    if(r.success && r.data && r.data.length>0){
      const note=r.data[0].note||'';
      if(note) return JSON.parse(note);
    }
  }catch(e){}
  return null;
}
async function cloudSaveLib(lib){
  try {
    const uid=getUserId();
    if(!uid) return;
    const ownerTag='__u:'+uid+'__';
    const r=await client.db.from('tasks').list().eq('task_date','__lib__').eq('name','task_names'+uid);
    if(r.success && r.data && r.data.length>0){
      await client.db.from('tasks').update().set({note:JSON.stringify(lib)}).eq('id',r.data[0].id);
    } else {
      await client.db.from('tasks').insert().values({
        task_date:'__lib__', name:'task_names'+uid, note:JSON.stringify(lib),
        prio:'', due:'', tags:JSON.stringify([ownerTag]), done:'false', done_at:'', ts:new Date().toISOString()
      });

}

let _cachedLib=null, _cachedTags=null;

async function getLib(){
  if(_cachedLib) return _cachedLib;
  const cloud = await cloudLoadLib();
  if(cloud && cloud.length>0){
    _cachedLib = cloud;
    localStorage.setItem(LS_LIB,JSON.stringify(cloud));
    return cloud;
  }
  let r=localStorage.getItem(LS_LIB);
  if(r){
    try{_cachedLib=JSON.parse(r);}catch(e){_cachedLib=r.split(',')}
    // 本地有旧数据但云端没有 → 推上云
    if(_cachedLib.length>0) await cloudSaveLib(_cachedLib);
    return _cachedLib;
  }
  _cachedLib = [...DEFAULT_LIB];
  return _cachedLib;
}

  localStorage.setItem(LS_LIB,JSON.stringify(l));

}

function getCurrentUser(){let r=localStorage.getItem(USER_KEY);if(r)try{return JSON.parse(r)}catch(e){}return null}

async function findAuthRecord(username){
  const r=await client.db.from('tasks').list().eq('task_date','__auth__').eq('name',username);
  if(r.success && r.data && r.data.length>0) return r.data[0];
  return null;
}

async function registerUser(username, password){
  const existing=await findAuthRecord(username);
  if(existing) return {ok:false, msg:'用户名已被注册'}
  const hash='u'+simpleHash(password);
  const res=await client.db.from('tasks').insert().values({task_date:'__auth__', name:username, note:hash, done:'false', prio:'', due:'', tags:'[]', done_at:'', ts:new Date().toISOString()});
  if(res.success){
    return {ok:true, user:{id:res.data, username}}
  }
  return {ok:false, msg:'注册失败，请重试'}
}

async function loginUser(username, password){
  const user=await findAuthRecord(username);
  if(!user) return {ok:false, msg:'用户名或密码错误'}
  const hash='u'+simpleHash(password);
  if(user.note!==hash) return {ok:false, msg:'用户名或密码错误'}
  return {ok:true, user:{id:user.id, username:user.name}}
}

function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return 'h'+h}

async function doLogin(){
  const u=$('#lockInput').value.trim(), p=$('#lockPwd').value;
  if(!u||!p){$('#lockError').textContent='请填写用户名和密码';return}
  $('#lockBtn').disabled=true;$('#lockBtn').textContent='登录中...';
  const r=await loginUser(u,p);
  if(r.ok){
    setCurrentUser(r.user);_userData=r.user;
    updateUserUI();
    tasksCache=[];renderAll();
    $('#lockModal').classList.remove('show');
    if(_lockResolve)_lockResolve();
  } else {
    $('#lockError').textContent=r.msg;
    $('#lockBtn').disabled=false;$('#lockBtn').textContent='登 录';
  }

async function doRegister(){
  const u=$('#lockInput').value.trim(), p=$('#lockPwd').value;

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(msg,color){
  const t=$('#toast');

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function weekday(s){const d=new Date(s);return '星期'+['日','一','二','三','四','五','六'][d.getDay()]}

function fmtDoneAt(iso){
  if(!iso) return '';
  const d=new Date(iso);
  const pad=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}
function visibleTags(tags){return (tags||[]).filter(t=>!t.startsWith('__u:'))}
function isInternalTag(k){return k.startsWith('__u:')}
function fmtDue(dueStr){
  if(!dueStr) return '';
  const parts=dueStr.split('T');
  return parts.length<2?parts[0].replace(/-/g,'/'):parts[0].replace(/-/g,'/')+' '+parts[1];
}

let tasksCache=[];
let loading=false;

function showLoading(){loading=true;$('#loadingOverlay').classList.add('show')}
function hideLoading(){loading=false;$('#loadingOverlay').classList.remove('show')}

  const u=getCurrentUser();
  if(u&&u.username){
    $('#userNameDisplay').textContent='👤 '+u.username;
    $('#logoutBtn').style.display='inline-block';
  } else {
    $('#userNameDisplay').textContent='';
    $('#logoutBtn').style.display='none';

}

async function loadTasks(dateStr){
  try {
    showLoading();
    const uid=getUserId();
    const res = await client.db.from('tasks').list().eq('task_date', dateStr);
    if (res.success && Array.isArray(res.data)) {
      const uid=getUserId();
      tasksCache = res.data.filter(t => {
        if(!uid) return false;
        const tags = t.tags ? JSON.parse(t.tags) : [];
        return !tags.some(x=>x.startsWith('__u:')) || tags.includes('__u:'+uid+'__');
      }).map(t => ({
        id: t.id,
        name: t.name || '',
        prio: t.prio || 'p2',
        due: t.due || '',
        tags: safeParseTags(t.tags),
        note: t.note || '',
        done: t.done === 'true',
        doneAt: t.done_at || null,
        ts: t.ts || ''
      }));
    } else {
      tasksCache = [];
    }
  } catch(e) {
    console.error('加载失败:', e);
    toast('☁️ 加载数据失败，请检查网络','#ef4444');
    tasksCache = [];
  } finally {
    hideLoading();
  }
  return tasksCache;
}

function safeParseTags(v){
  if(!v) return [];
  try{return JSON.parse(v)}catch(e){return [v]}
}

async function saveTaskToCloud(task){
  try {
    const uid=getUserId();
    const ownerTag = '__u:'+uid+'__';
    const saveTags = JSON.stringify((task.tags || []).filter(x=>!x.startsWith('__u:')).concat([ownerTag]));
    const data = {
      task_date: task.task_date,
      name: task.name,
      prio: task.prio,
      due: task.due || '',
      tags: saveTags,
      note: task.note || '',
      done: task.done ? 'true' : 'false',
      done_at: task.doneAt || '',
      ts: task.ts || new Date().toISOString()
    };
    if (task.id) {
      await client.db.from('tasks').update().set(data).eq('id', task.id);
    } else {
      const res = await client.db.from('tasks').insert().values(data);
      if (res.success) task.id = res.data;
    }
  } catch(e) {
    console.error('保存失败:', e);
    throw e;
  }
}

async function deleteTaskFromCloud(id){
  try {
    await client.db.from('tasks').delete().eq('id', id);
  } catch(e) {
    console.error('删除失败:', e);
    throw e;
  }
}

function getVisibleTasks(){
  const st=_filterOverride, pr=filterPriority.value, tg=filterTag.value;
  const df=filterDueFrom.value, dt=filterDueTo.value;
  let filtered=tasksCache.filter(t=>{
    if(st==='pending'&&t.done)return false;
    if(st==='done'&&!t.done)return false;
    if(st==='overdue'){if(t.done||!t.due)return false;const dd=new Date(t.due);if(!isNaN(dd.getTime())&&dd>=new Date())return false}
    if(pr!=='all'&&t.prio!==pr)return false;
    if(tg!=='all'){
      const tags=(t.tags||[]).map(x=>x.trim().toLowerCase());
      if(!tags.includes(tg.toLowerCase()))return false;
    }
    if(df&&t.due&&t.due<df)return false;
    if(dt&&t.due&&t.due>dt)return false;
    return true;
  });
  const s=sortBy.value;
  filtered.sort((a,b)=>{
    if(s==='prio'){const r={p1:0,p2:1,p3:2};return(r[a.prio]??1)-(r[b.prio]??1)}
    if(s==='due'){
      if(!a.due&&!b.due)return 0;
      if(!a.due)return 1;if(!b.due)return -1;
      return a.due.localeCompare(b.due);
    }
    if(s==='alpha')return a.name.localeCompare(b.name);
    return 0;
  });
  return filtered;
}

function isOverdue(task){
  if(task.done||!task.due)return false;
  const due=new Date(task.due);
  if(isNaN(due.getTime()))return false;
  return due<new Date();
}

function renderTasks(){
  const visible=getVisibleTasks();
  if(visible.length===0){
    taskList.innerHTML='<li class="empty-tip">😴 没有匹配的待办</li>';
  } else {
    taskList.innerHTML=visible.map(t=>{
      const od=isOverdue(t);
      const nameCls=t.done?'name done':'name';
      const prioLabel={p1:'高',p2:'中',p3:'低'}[t.prio]||'中';
      const dueStr=fmtDue(t.due);
      const odHtml=od?'<span class="overdue">⚠️ 已逾期</span>':'';
      return `<li class="task-item" data-id="${t.id}">
        <div class="prio-bar ${t.prio||'p2'}"></div>
        <div class="check-col"><div class="cb ${t.done?'done':''}" onclick="toggleDone(${t.id})">${t.done?'✓':''}</div></div>
        <div class="body-col">
          <div class="${nameCls}">${escHtml(t.name)}</div>
          <div class="meta">
            <span>${prioLabel}</span>
            ${dueStr?`<span>📅 ${dueStr} ${odHtml}</span>`:''}
            ${visibleTags(t.tags).map(x=>`<span class="tag">${escHtml(x)}</span>`).join('')}
            ${t.note?`<span>📝 ${escHtml(t.note)}</span>`:''}
            ${t.done&&t.doneAt?`<span>✅ ${fmtDoneAt(t.doneAt)}</span>`:''}
          </div>
        </div>
        <div class="actions-col">
          <button class="btn-icon" onclick="editTask(${t.id})">✏️</button>
          <button class="btn-icon" onclick="deleteTask(${t.id})">🗑️</button>
        </div>
      </li>`;
    }).join('');
  }
  updateStats();
  updateSummary();
  updateFilters();
  updateUnfinishedCount();
}

function updateStats(){
  const done=tasksCache.filter(t=>t.done).length;
  const total=tasksCache.length;
  doneCount.textContent=done;
  pendCount.textContent=total-done;
  overdueCount.textContent=tasksCache.filter(t=>isOverdue(t)).length;
  doneRate.textContent=total>0?Math.round(done/total*100)+'%':'0%';
  totalBadge.textContent=total+' 项';
}

function updateSummary(){
  const map={};
  tasksCache.forEach(t=>{
    if(!map[t.name])map[t.name]={name:t.name,prio:t.prio||'p2',total:0,done:0};
    map[t.name].total++;if(t.done)map[t.name].done++;
  });
  const entries=Object.values(map);
  if(entries.length===0){
    summaryList.innerHTML='<li class="empty-tip" style="padding:16px 0">暂无数据</li>';
    summaryBadge.textContent='0 项';
  } else {
    summaryBadge.textContent=entries.length+' 项';
    summaryList.innerHTML=entries.map(e=>{
      const pct=e.total>0?Math.round(e.done/e.total*100):0;
      return `<li class="summary-item"><span class="name">${escHtml(e.name)}</span><span class="count"><span class="done">✅${e.done}</span> / <span class="pending">⏳${e.total-e.done}</span></span><span class="pct">${pct}%</span></li>`;
    }).join('');
  }
  const tagMap={};
  tasksCache.forEach(t=>(t.tags||[]).forEach(tg=>{const k=tg.trim();if(!k)return;if(!tagMap[k])tagMap[k]={total:0,done:0};tagMap[k].total++;if(t.done)tagMap[k].done++}));
  const tagEntries=Object.entries(tagMap).filter(([k])=>!isInternalTag(k));
  $('#tagDistribution').innerHTML=tagEntries.length===0?'暂无标签':
    tagEntries.map(([k,v])=>`<span class="tag-chip"><span class="num">${v.done}/${v.total}</span> ${escHtml(k)}</span>`).join('');
}

function updateFilters(){
  const tagSet=new Set();
  tasksCache.forEach(t=>(t.tags||[]).forEach(tg=>{const k=tg.trim();if(k)tagSet.add(k)}));
  const cur=filterTag.value;
  filterTag.innerHTML='<option value="all">全部标签</option>'+[...tagSet].sort().map(t=>`<option value="${escHtml(t)}">${escHtml(t)}</option>`).join('');
  filterTag.value=tagSet.has(cur)?cur:'all';
}

async function toggleDone(id){
  const t=tasksCache.find(x=>x.id===id);
  if(!t)return;
  t.done=!t.done;
  t.doneAt=t.done?new Date().toISOString():null;
  try {
    await client.db.from('tasks').update().set({done:t.done?'true':'false', done_at:t.doneAt||''}).eq('id',id);
    renderTasks();
    const uid=getUserId();if(uid) logOperation(uid,'toggle','"'+t.name+'" '+(t.done?'已完成':'取消完成'));
  } catch(e) {
    toast('☁️ 更新失败','#ef4444');
    t.done=!t.done;t.doneAt=t.done?new Date().toISOString():null;
  }
}

async function deleteTask(id){
  const t=tasksCache.find(x=>x.id===id);
  if(!t)return;
  showConfirm('删除确认','删除 "'+t.name+'" ？此操作不可恢复。','删除',async()=>{

function getDateRange(mode){
  const d=new Date(dateIn.value);
  const y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();
  if(mode==='day') return {from:dateIn.value,to:dateIn.value,label:dateIn.value};
  if(mode==='week'){
    const dow=d.getDay();const diff=(dow===0?6:dow-1);
    const mon=new Date(d);mon.setDate(day-diff);
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    return {from:fmtDate(mon),to:fmtDate(sun),label:fmtDate(mon)+'~'+fmtDate(sun)};
  }
  const first=fmtDate(new Date(y,m-1,1)),last=fmtDate(new Date(y,m,0));
  return {from:first,to:last,label:y+'-'+String(m).padStart(2,'0')};
}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

async function collectRangeData(from,to){
  const rows=[];let seq=0;
  const uid=getUserId();
  const cur=new Date(from+'T00:00:00');const end=new Date(to+'T00:00:00');
  while(cur<=end){
    const s=fmtDate(cur);
    try {
      const res=await client.db.from('tasks').list().eq('task_date',s);
      if(res.success&&Array.isArray(res.data)){
        res.data.filter(t=>{
          const tg=t.tags?JSON.parse(t.tags):[];
          return !tg.some(x=>x.startsWith('__u:'))||tg.includes('__u:'+uid+'__');
        }).forEach(t=>{
          seq++;
          const tags=[];try{tags.push(...JSON.parse(t.tags||'[]'))}catch(e){}
          rows.push({
            date:s,weekday:weekday(s),seq,
            name:t.name||'',prio:{p1:'高',p2:'中',p3:'低'}[t.prio]||'中',
            due:t.due||'',tags:tags.join('; '),note:t.note||'',
            status:t.done==='true'?'已完成':'待完成',
            doneAt:t.done_at?fmtDoneAt(t.done_at):''
          });
        });
      }
    } catch(e) {}
    cur.setDate(cur.getDate()+1);
  }
  return rows;
}

async function exportExcel(mode){
  showLoading();
  const r=getDateRange(mode);
  const data=await collectRangeData(r.from,r.to);
  hideLoading();
  if(data.length===0){toast('所选范围内无数据','#f59e0b');return}
  const aoa=[
    ['工作待办报表'],['范围',r.label,'导出时间',new Date().toLocaleString('zh-CN')],[],
    ['日期','星期','序号','待办事项','优先级','截止日期时间','标签','备注','状态','完成时间']
  ];
  data.forEach(d=>{aoa.push([d.date,d.weekday,d.seq,d.name,d.prio,d.due,d.tags,d.note,d.status,d.doneAt])});
  const done=data.filter(d=>d.status==='已完成').length,total=data.length;
  aoa.push([]);aoa.push(['统计']);aoa.push(['总事项',total,'已完成',done,'待完成',total-done,'完成率',total>0?Math.round(done/total*100)+'%':'0%']);
  loadSheetAndExport(aoa,`工作待办_${r.label}.xlsx`);
}

function loadSheetAndExport(aoa,filename){
  if(typeof XLSX!=='undefined'){doExport(aoa,filename);return}
  const s=document.createElement('script');
  s.src='/test2/lib/xlsx.full.min.js';
  s.onload=()=>doExport(aoa,filename);
  s.onerror=()=>{toast('加载导出库失败，改用 CSV','#f59e0b');exportCSV(aoa,filename)};
  document.head.appendChild(s);
}
function doExport(aoa,filename){
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:12},{wch:6},{wch:6},{wch:22},{wch:8},{wch:16},{wch:20},{wch:24},{wch:10},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws,'工作待办');
  XLSX.writeFile(wb,filename);
  toast('📥 已导出：'+filename,'#34c759');
}
function exportCSV(aoa,filename){
  let csv='';aoa.forEach(row=>{csv+=row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')+'\n'});
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename.replace('.xlsx','.csv');
  a.click();URL.revokeObjectURL(a.href);toast('📥 已导出 CSV','#34c759')
}

// ===== 迁移旧数据（首次登录自动归并） =====
async function migrateOldData(){
  try {
    const uid=getUserId();
    if(!uid)return;
    const key='migrated_old_global_v1';
    if(localStorage.getItem(key)) return;
    let allTasks=[];
    try {
      const r=await client.db.from('tasks').list();
      if(r.success&&r.data) allTasks.push(...r.data);
    } catch(e){}
    const unowned=allTasks.filter(t=>{
      const tg=[];try{tg.push(...JSON.parse(t.tags||'[]'));}catch(e){}
      return !tg.some(x=>x.startsWith('__u:'));
    }).filter(t=>t.task_date!=='__auth__');
    if(unowned.length>0){
      for(const t of unowned){
        let tg=[];try{tg=JSON.parse(t.tags||'[]');}catch(e){}
        tg.push('__u:'+uid+'__');
        await client.db.from('tasks').update().set({tags:JSON.stringify(tg)}).eq('id',t.id);
      }
      localStorage.setItem(key, '1');
      toast('已归并 '+unowned.length+' 条旧数据 ✅');
    } else {
      localStorage.setItem(key, '1');
    }
  } catch(e){
    console.warn('旧数据迁移跳过:', e);
  }
}

// ===== 清理脏数据（__u: 旧前缀标签 / _u: 单下划线标签） =====
async function migrateOldTags(){
  const uid=getUserId();
  if(!uid) return;
  const key='migrated_old_tags_v1';
  if(localStorage.getItem(key)) return;
  try{
    const res=await client.db.from('tasks').list();
    if(!res.success||!res.data) return;
    let fixed=0;
    for(const t of res.data){
      if(t.task_date==='__auth__') continue;
      const tags=[];try{tags.push(...JSON.parse(t.tags||'[]'));}catch(e){}
      let changed=false;
      const cleaned=tags.map(tag=>{
        if(tag.startsWith('_u:')&&!tag.startsWith('__u:')){
          const newTag='__u:'+tag.slice(3);
          changed=true;
          return newTag;
        }
        return tag;
      });
      if(changed){
        await client.db.from('tasks').update().set({tags:JSON.stringify(cleaned)}).eq('id',t.id);
        fixed++;
      }
    }
    localStorage.setItem(key,'1');
    if(fixed>0) toast('已修复 '+fixed+' 条旧标签格式 ✅','#34c759');
  }catch(e){
    console.warn('旧标签迁移跳过:',e);
  }
}

// ===== 清理 __lib__ 脏数据 =====
async function cleanupOrphanLibRecords(){
  const uid=getUserId();
  if(!uid) return;
  const key='cleaned_orphan_lib_v1';
  if(localStorage.getItem(key)) return;
  try{
    const res=await client.db.from('tasks').list();
    if(!res.success||!res.data) return;
    let delCount=0;
    for(const t of res.data){
      if(t.task_date==='__lib__'||t.task_date==='__auth__') continue;
      const name=t.name||'';
      if(name.startsWith('task_names')||name.startsWith('tag_names')){
        await client.db.from('tasks').delete().eq('id',t.id);
        delCount++;
      }
    }
    localStorage.setItem(key,'1');
    if(delCount>0) toast('已清理 '+delCount+' 条脏数据 ✅','#34c759');
  }catch(e){
    console.warn('脏数据清理跳过:',e);
  }
}


// ===== 未完成事项库 =====
let _unfinishedTasks=[];

async function loadUnfinishedTasks(){
  try{
    const uid=getUserId();
    if(!uid) return;
    const res=await client.db.from('tasks').list();
    if(!res.success||!res.data) return;
    _unfinishedTasks=res.data.filter(t=>{
      if(t.task_date==='__lib__'||t.task_date==='__auth__') return false;
      if(t.done==='true') return false;
      const tg=[];try{tg.push(...JSON.parse(t.tags||'[]'));}catch(e){}
      return !tg.some(x=>x.startsWith('__u:'))||tg.includes('__u:'+uid+'__');
    }).map(t=>({
      id:t.id, name:t.name, date:t.task_date, prio:t.prio||'p2',
      due:t.due||'', note:t.note||'',
      tags:t.tags?JSON.parse(t.tags):[]
    }));
    renderUnfinishedTasks();
  }catch(e){
    console.warn('loadUnfinishedTasks error:',e);
  }
}

function renderUnfinishedTasks(){
  const list=$('#unfinishedList');
  const badge=$('#unfinishedBadge');
  if(!_unfinishedTasks.length){
    list.innerHTML='已完成所有待办 \u{1F389}';
    badge.textContent='0 项';
    return;
  }
  const now=new Date();
  const pend=_unfinishedTasks.filter(t=>{
    if(!t.due) return true;
    const dd=new Date(t.due);
    return isNaN(dd.getTime())||dd>=now;
  });
  const overdue=_unfinishedTasks.filter(t=>{
    if(!t.due) return false;
    const dd=new Date(t.due);
    return !isNaN(dd.getTime())&&dd<now;
  });
  badge.textContent=pend.length+' 待\u00B7'+overdue.length+' 逾期';
  let html='';
  if(overdue.length){
    html+='<div style="font-weight:600;color:#ef4444;font-size:12px;margin-bottom:4px">\u{1F534} 逾期 ('+overdue.length+')</div>';
    html+=overdue.map(t=>makeUnfItem(t,true)).join('');
  }
  if(pend.length){
    html+='<div style="font-weight:600;color:#f59e0b;font-size:12px;margin-top:8px;margin-bottom:4px">\u23F3 待完成 ('+pend.length+')</div>';
    html+=pend.map(t=>makeUnfItem(t,false)).join('');
  }
  list.innerHTML=html;
}

function makeUnfItem(t,od){
  const dateLabel=t.date.replace(/-/g,'/');
  const prioLabel={p1:'\u{1F534}',p2:'\u{1F7E1}',p3:'\u26AA'}[t.prio]||'\u{1F7E1}';
  return '<div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f5f5f5">'+
    '<input type="checkbox" style="accent-color:#34c759" onchange="completeUnfinished('+t.id+')">'+
    '<div style="flex:1;min-width:0">'+
      '<span style="font-size:11px;color:#999">'+prioLabel+' '+dateLabel+'</span> '+
      '<span style="color:#1d1d1f">'+escHtml(t.name)+'</span>'+
    '</div></div>';
}

async function completeUnfinished(id){
  try{
    const t=_unfinishedTasks.find(x=>x.id===id);
    if(!t) return;
    await client.db.from('tasks').update().set({done:'true',done_at:new Date().toISOString()}).eq('id',id);
    const uid=getUserId();if(uid) logOperation(uid,'unfinish','未完成库勾选 "'+t.name+'"');
    toast('\u2705 已标记完成：'+t.name,'#34c759');
    await loadUnfinishedTasks();
    await renderAll();
  }catch(e){
    toast('\u2601\uFE0F 操作失败','#ef4444');
  }
}

function updateUnfinishedCount(){
  const pending=tasksCache.filter(t=>t.done!=='true').length;
  const overdue=tasksCache.filter(t=>isOverdue(t)).length;
  const badge=$('#unfinishedBadge');
  if(badge) badge.textContent=pending+' 项待\u00B7'+overdue+' 逾期';
}

// ===== 操作日志 =====
let _activityLogOpen=false;

function toggleActivityLog(){
  _activityLogOpen=!_activityLogOpen;
  const list=$('#activityLogList');
  const toggle=$('#activityToggle');
  if(_activityLogOpen){
    list.style.display='block';
    toggle.textContent='收起 \u25BE';
    reloadActivityLogs();
  }else{
    list.style.display='none';
    toggle.textContent='展开 \u25B8';
  }
}

async function logOperation(userId,opType,detail){
  try{
    const logEntry={
      task_date:'__log__',
      name:'op_'+Date.now(),
      note:JSON.stringify({
        userId,opType,detail,
        time:new Date().toISOString()
      }),
      done:'false',prio:'p3',due:'',tags:JSON.stringify(['__u:'+userId+'__','__log__']),done_at:'',
      ts:new Date().toISOString()
    };
    await client.db.from('tasks').insert().values(logEntry);
    await trimLogs(userId);
  }catch(e){}
}

async function trimLogs(userId){
  try{
    const r=await client.db.from('tasks').list().eq('task_date','__log__');
    if(!r.success||!r.data) return;
    const logs=r.data.filter(t=>{
      const tg=[];try{tg.push(...JSON.parse(t.tags||'[]'));}catch(e){}
      return tg.includes('__u:'+userId+'__');
    }).sort((a,b)=>a.ts.localeCompare(b.ts));
    if(logs.length>500){
      const toDel=logs.slice(0,logs.length-500);
      for(const t of toDel) await client.db.from('tasks').delete().eq('id',t.id).catch(()=>{});
    }
  }catch(e){}
}

async function reloadActivityLogs(){
  try{
    const uid=getUserId();
    if(!uid) return;
    const r=await client.db.from('tasks').list().eq('task_date','__log__');
    if(!r.success||!r.data) return;
    const logs=r.data.filter(t=>{
      const tg=[];try{tg.push(...JSON.parse(t.tags||'[]'));}catch(e){}
      return tg.includes('__u:'+uid+'__');
    }).sort((a,b)=>b.ts.localeCompare(a.ts)).slice(0,30);
    const list=$('#activityLogList');
    if(!logs.length){
      list.innerHTML='<div style="padding:12px 0;text-align:center;color:#aaa">暂无操作记录</div>';
      return;
    }
    list.innerHTML=logs.map(l=>{
      let detail='';
      try{detail=JSON.parse(l.note||'{}');}catch(e){}
      const time=detail.time?new Date(detail.time).toLocaleString('zh-CN',{hour12:false}):'';
      const icon={add:'\u2795',toggle:'\u2705',edit:'\u270F\uFE0F',delete:'\u{1F5D1}\uFE0F',reset:'\u{1F504}',unfinish:'\u{1F4CD}'}[detail.opType]||'\u{1F4CB}';
      return '<div style="padding:5px 0;border-bottom:1px solid #f0f0f0">'+
        '<span style="font-size:11px;color:#999">'+time+'</span> '+icon+' '+
        '<span>'+escHtml(detail.detail||'')+'</span></div>';
    }).join('')+'<div style="padding:5px 0;text-align:center"><button class="btn-second" onclick="showAllLogs()" style="font-size:11px;padding:4px 10px">查看全部</button></div>';
  }catch(e){
    console.warn('reloadActivityLogs error:',e);
  }
}

async function showAllLogs(){
  try{
    const uid=getUserId();
    if(!uid) return;
    const r=await client.db.from('tasks').list().eq('task_date','__log__');
    if(!r.success||!r.data) return;
    const logs=r.data.filter(t=>{
      const tg=[];try{tg.push(...JSON.parse(t.tags||'[]'));}catch(e){}
      return tg.includes('__u:'+uid+'__');
    }).sort((a,b)=>b.ts.localeCompare(a.ts)).slice(0,200);
    const div=document.createElement('div');
    div.id='showAllLogsOverlay';
    div.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;justify-content:center;align-items:center;padding:20px';
    const contentDiv=document.createElement('div');
    contentDiv.style.cssText='background:white;border-radius:16px;padding:24px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto';
    contentDiv.innerHTML='<h3 style="font-size:17px;font-weight:600;margin-bottom:16px">📋 全部操作日志</h3>'+
      logs.map(l=>{
        let detail={};
        try{detail=JSON.parse(l.note||'{}');}catch(e){}
        const time=detail.time?new Date(detail.time).toLocaleString('zh-CN',{hour12:false}):'';
        const icon={add:'➕',toggle:'✅',edit:'✏️',delete:'🗑️',reset:'🔄',unfinish:'📍'}[detail.opType]||'📋';
        return '<div style="padding:6px 0;border-bottom:1px solid #f0f0f0"><span style="color:#999;font-size:12px">'+time+'</span> '+icon+' '+escHtml(detail.detail||'')+'</div>';
      }).join('')+
      '<div style="margin-top:16px;text-align:center"><button class="btn" id="closeAllLogsBtn">关闭</button></div>';
    contentDiv.querySelector('#closeAllLogsBtn').onclick=function(){div.remove()};
    div.appendChild(contentDiv);
    document.body.appendChild(div);
  }catch(e){}
}
